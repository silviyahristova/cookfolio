{%extends 'base.html' %}

{% block title %}Cookfolio - Add Recipe{% endblock %}

{% block content %}
<section class="add-recipe-section">
    <div class="add-recipe-container">
        <div class="add-recipe-text">
            <h1>Add Recipe</h1>
            <p>Fill out the details below to add a new recipe.</p>
            
            <form method="POST" action="{{ url_for('main.add_recipe') }}" enctype="multipart/form-data" class="add-recipe-form">
                <div class="recipe-layout">
                    <div class="recipe-left">
                        <div class="form-group">
                            <label for="title">Recipe Title:</label>
                            <input type="text" id="title" name="title" placeholder="Enter recipe title" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="photo" class="photo-upload-box">
                                <i class="fa-solid fa-camera"></i>
                                <span class="photo-upload-text">Upload Photo</span>
                            </label>
                            <input type="file" id="photo" name="photo" placeholder="Upload image" enctype="multipart/form-data" accept=".jpg, .jpeg, .png, .webp" hidden>
                            <p class="file-text" id="file-name">No file selected</p>
                        </div>

                        <div class="form-group">
                            <label for="category_id">Category:</label>
                            <select id="category_id" name="category_id" required>
                                <option value="" selected disabled>Select category</option>
                                {% for category in categories %}
                                    <option value="{{ category.id }}">{{ category.name }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="prep_time">Prep Time: </label>
                                <input type="number" id="prep_time" name="prep_time" placeholder="e.g., 15" min="1" required>
                            </div>
                            <div class="form-group">
                                <label for="servings">Servings:</label>
                                <input type="number" id="servings" name="servings" placeholder="e.g., 4" min="1" required>
                            </div>
                        </div>
                    </div>

                    <div class="recipe-right">
                        <div class="form-group">
                            <label for="ingredients">Ingredients:</label>
                            <textarea id="ingredients" name="ingredients" placeholder="Enter ingredients" required></textarea>
                        </div>
                            
                        <div class="form-group">
                            <label for="instructions">Instructions:</label>
                            <textarea id="instructions" name="instructions" placeholder="Enter cooking instructions" required></textarea>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-success" id="save-recipe-button">Save Recipe</button>
                            <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary" id="cancel-button" onclick="return confirm('Are you sure you want to cancel?')">Cancel</a>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
