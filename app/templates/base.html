<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Cookfolio is a recipe management application where users can create, edit, save and organise own recipes, plan meals and discover new dishes in one place.">
    <meta name="theme-color" content="#E53935">
    <meta name="keywords" content="recipes, cooking, meal planning, food, recipe management, cookfolio, cookbook, cooking app, recipe website, food recipes">
    <meta name="autor" content="Silviya Hristova">
    <meta name="robots" content="index, follow">


    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <title>{% block title %}Cookfolio{% endblock %}</title>
</head>

<body>
    <!--nav bar-->
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="{{ url_for('main.home') }}">Cookfolio</a>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('main.home') }}">Home</a></li>
                <li><a href="#">Discover</a></li>
                <li><a href="#">Login</a></li>
                <li><a href="#">Register</a></li>
            </ul>
        </nav>
    </header>       

    <main>

        {% block content %}
        
        {% endblock %}

    </main>

    <footer class="footer">
        <div class="footer-links">
            <a href="{{ url_for('main.home') }}">Home</a>
            <a href="#">Discover</a>
            <a href="#">Dashboard</a>
            <a href="#">Support</a>
        </div>

        <p> &copy; 2026 Cookfolio</p>
    </footer>

</body>
</html>
