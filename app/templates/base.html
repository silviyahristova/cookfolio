<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
    <meta name="description" content="Cookfolio is a recipe management application where users can create, edit, save and organise own recipes, plan meals and discover new dishes in one place.">
    <meta name="theme-color" content="#E53935">
    <meta name="keywords" content="recipes, cooking, meal planning, food, recipe management, cookfolio, cookbook, cooking app, recipe website, food recipes">
    <meta name="autor" content="Silviya Hristova">
    <meta name="robots" content="index, follow">

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='images/favicon/apple-touch-icon.png')}}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon/favicon-32x32.png')}}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='images/favicon/favicon-16x16.png')}}">
    <link rel="manifest" href="{{ url_for('static', filename='images/favicon/site.webmanifest')}}">
    <link rel="mask-icon" href="{{ url_for('static', filename='images/favicon/safari-pinned-tab.svg')}}" color="#E53935">
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/favicon/favicon.ico')}}">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    
    <!-- Font Awesome icons-->
    <script src="https://kit.fontawesome.com/65fc689ce4.js" crossorigin="anonymous"></script>

    <!-- Stylesheet css-->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <title>{% block title %}Cookfolio{% endblock %}</title>
</head>

<body>
    <!--nav bar-->
    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="{{ url_for('main.home') }}">Cookfolio</a>
            </div>
            <button class="menu-toggle" id="menu-toggle" type="button" aria-label="Open menu"><i class="fa-solid fa-bars"></i></button>
            <ul class="navbar-links" id="navbar-links">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('main.home') }}">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Discover</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Support</a>
                </li>
                <li class="divider"></li>
                <li class="nav-item">
                    <a class="btn" href="#">Log in</a>
                </li>
                <li class="nav-item">
                    <a class="btn" href="#">Sign up</a>
                </li>
            </ul>
        </nav>
    </header>       

    <main>

        {% block content %}
        
        {% endblock %}

    </main>

    <footer class="footer">
        <div class="footer-links">
            <a href="{{ url_for('main.home') }}">Home</a>
            <a href="#">Discover</a>
            <a href="#">Dashboard</a>
            <a href="#">Support</a>
        </div>

        <p> &copy; 2026 Cookfolio</p>
    </footer>
    
    <!-- Bootstrap JS-->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js" integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM" crossorigin="anonymous"></script>

    <!-- JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
